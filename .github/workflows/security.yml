name: Security

on:
  pull_request:
    branches: [development, staging, main]
  push:
    branches: [development, staging, main]
  schedule:
    - cron: "17 3 * * 1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [rust, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4

  dependencies:
    name: Dependency Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: cargo install cargo-deny cargo-audit --locked
      - run: cargo deny check
      - run: cargo audit
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high

  fallow-security:
    name: Fallow Security Candidates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx fallow security --workspace apps/web --surface --format json --quiet
